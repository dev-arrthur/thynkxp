<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabalhe Conosco | ThynkXP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      background: #f3efe8;
      font-family: "Inter", system-ui, sans-serif;
      color: #161616;
    }

    .top-nav {
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .top-nav img {
      height: 54px;
      object-fit: contain;
    }

    .hero-jobs,
    .jobs-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .hero-jobs {
      padding-top: 8px;
      padding-bottom: 14px;
    }

    .hero-jobs h1 {
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .hero-jobs h1 span {
      color: #ff7a00;
    }

    .hero-jobs p {
      margin: 0;
      max-width: 760px;
      color: #6a6359;
      font-size: 17px;
    }

    .filters {
      background: #fff;
      border: 1px solid #e6dccf;
      border-radius: 18px;
      padding: 14px;
      margin: 18px 0 20px;
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      gap: 10px;
    }

    .filters .form-control,
    .filters .form-select {
      border-radius: 12px;
      border: 1px solid #dacfbf;
      min-height: 44px;
    }

    .jobs-wrap {
      padding-bottom: 52px;
    }

    .jobs-list {
      display: grid;
      gap: 12px;
    }

    .vaga-item {
      background: #fff;
      border: 1px solid #e5dccf;
      border-radius: 16px;
      overflow: hidden;
    }

    .vaga-head {
      width: 100%;
      border: none;
      background: #fff;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.3fr .8fr .7fr .5fr auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }

    .vaga-head:hover {
      background: #fff9f0;
    }

    .vaga-title {
      font-weight: 800;
      font-size: 18px;
      margin: 0;
    }

    .vaga-mini {
      margin: 0;
      color: #635d54;
      font-size: 14px;
    }

    .vaga-chip {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      border-radius: 999px;
      border: 1px solid #eadfce;
      background: #fff8ee;
      padding: 5px 11px;
      text-align: center;
    }

    .vaga-arrow {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #ff8c00, #ff5e00, #ff9b2f);
      justify-self: end;
      transition: .2s;
    }

    .vaga-head[aria-expanded="true"] .vaga-arrow {
      transform: rotate(180deg);
    }

    .vaga-body {
      border-top: 1px solid #f0e7db;
      padding: 16px;
      background: #fffdf8;
    }

    .vaga-body h4 {
      font-size: 17px;
      font-weight: 800;
      margin: 14px 0 8px;
    }

    .vaga-body ul {
      margin: 0;
      padding-left: 18px;
      color: #4f4a42;
    }

    .vaga-body li {
      margin-bottom: 7px;
    }

    .timeline {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .timeline-item {
      border: 1px solid #eadfce;
      background: #fff;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 600;
    }

    .btn-apply {
      border-radius: 999px;
      padding: 10px 20px;
      font-weight: 700;
      border: none;
      color: #fff;
      background: linear-gradient(135deg, #ff8c00, #ff5e00, #ff9b2f);
      margin-top: 14px;
    }

    .empty {
      background: #fff;
      border: 1px dashed #dacfbf;
      border-radius: 14px;
      padding: 20px;
      color: #6e675f;
      text-align: center;
    }

    .modal-content {
      border-radius: 24px;
      border: 1px solid #e6dccd;
    }

    .modal-header {
      border-bottom: 1px solid #efe6da;
    }

    .form-label {
      font-weight: 600;
      color: #3e3933;
    }

    .form-control,
    .form-select {
      border-radius: 12px;
      border: 1px solid #dacfbf;
      padding: 10px 12px;
    }

    .helper-note {
      font-size: 12px;
      color: #7a746b;
    }

    @media (max-width: 991px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .vaga-head {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .vaga-arrow {
        justify-self: start;
      }

      .top-nav {
        padding: 14px 16px;
      }

      .top-nav img {
        height: 46px;
      }

      .hero-jobs,
      .jobs-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>

<body id="top">
  <header class="top-nav">
    <a href="index.html"><img src="img/logo.png" alt="Logo ThynkXP" /></a>
  </header>

  <section class="hero-jobs">
    <h1>Trabalhe com a <span>ThynkXP</span>.</h1>
    <p>Pesquise e filtre as vagas. Cada vaga aparece em uma linha com dados essenciais; clique para abrir os detalhes completos.</p>

    <div class="filters">
      <input id="searchInput" class="form-control" type="search" placeholder="Pesquisar vaga, área, tecnologia..." />
      <select id="areaFilter" class="form-select">
        <option value="">Filtrar por área</option>
        <option value="Tecnologia">Tecnologia</option>
        <option value="Design">Design</option>
        <option value="Produto">Produto</option>
      </select>
      <select id="modeloFilter" class="form-select">
        <option value="">Filtrar por modelo</option>
        <option value="Remoto">Remoto</option>
        <option value="Híbrido">Híbrido</option>
      </select>
    </div>
  </section>

  <section class="jobs-wrap">
    <div id="jobsList" class="jobs-list"></div>
  </section>

  <div class="modal fade" id="modalCandidatura" tabindex="-1" aria-labelledby="modalCandidaturaLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalCandidaturaLabel">Candidatar-se</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <form>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-12">
                <label for="nomeCompleto" class="form-label">Nome Completo</label>
                <input id="nomeCompleto" type="text" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label for="nascimento" class="form-label">Nascimento</label>
                <input id="nascimento" type="date" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">E-mail</label>
                <input id="email" type="email" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label for="telefone" class="form-label">Telefone</label>
                <input id="telefone" type="tel" class="form-control" placeholder="(00) 00000-0000" required />
              </div>

              <div class="col-md-6">
                <label for="cep" class="form-label">CEP (AutoComplete)</label>
                <input id="cep" type="text" class="form-control" maxlength="9" placeholder="00000-000" required />
                <p class="helper-note mb-0 mt-1">Ao preencher o CEP, cidade e estado serão preenchidos automaticamente.</p>
              </div>

              <div class="col-md-6">
                <label for="estado" class="form-label">Estado</label>
                <input id="estado" type="text" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label for="cidade" class="form-label">Cidade</label>
                <input id="cidade" type="text" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label for="divisor" class="form-label">Divisor</label>
                <select id="divisor" class="form-select" required>
                  <option value="" selected disabled>Selecione</option>
                  <option>Tecnologia</option>
                  <option>Produto</option>
                  <option>Design</option>
                  <option>Marketing</option>
                  <option>Comercial</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="portfolioTem" class="form-label">Possui Portfólio? Que tal nos encaminhar</label>
                <select id="portfolioTem" class="form-select" required>
                  <option value="" selected disabled>Selecione</option>
                  <option value="sim">Sim</option>
                  <option value="nao">Não</option>
                </select>
              </div>

              <div class="col-12">
                <label for="portfolioLink" class="form-label">Input para adicionar link</label>
                <input id="portfolioLink" type="url" class="form-control" placeholder="https://" />
              </div>

              <div class="col-12">
                <label for="curriculo" class="form-label">Adicione Currículo (PDF)</label>
                <input id="curriculo" type="file" class="form-control" accept="application/pdf" required />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light border rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn-apply">Candidatar-se</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const jobs = [
      {
        id: 'vaga-dev-jr',
        titulo: 'Desenvolvedor Jr.',
        salario: 'R$ 3.900,00',
        area: 'Tecnologia',
        modelo: 'Remoto',
        tipo: 'CLT',
        descricao: 'Apoiar o desenvolvimento de projetos web, implementando funcionalidades e melhorias contínuas.',
        atividades: [
          'Desenvolver componentes e páginas com HTML, CSS e JavaScript.',
          'Dar suporte em integrações com APIs e serviços internos.',
          'Corrigir bugs e apoiar deploys monitorados.',
          'Participar de alinhamentos com design, produto e time técnico.'
        ],
        requisitos: [
          'Conhecimento em HTML, CSS, JavaScript e Git.',
          'Noções de responsividade e semântica.',
          'Boa comunicação e vontade de aprender.',
          'Diferencial: Bootstrap e APIs REST.'
        ],
        beneficios: [
          'VA de R$ 400,00',
          'Auxílio Home Office',
          'Equipamentos de trabalho',
          'Day Off de aniversário',
          'Gym Pass',
          'Plano de saúde e odontológico',
          'Vale educação/cursos',
          'Mentoria técnica'
        ]
      },
      {
        id: 'vaga-ux',
        titulo: 'Designer UX/UI Pleno',
        salario: 'R$ 5.200,00',
        area: 'Design',
        modelo: 'Híbrido',
        tipo: 'CLT',
        descricao: 'Criar experiências digitais intuitivas e visuais de alto impacto para produtos e sites.',
        atividades: [
          'Desenhar fluxos, wireframes e protótipos no Figma.',
          'Conduzir melhorias de usabilidade com base em dados.',
          'Garantir consistência no design system.',
          'Trabalhar em parceria com produto e desenvolvimento.'
        ],
        requisitos: [
          'Experiência com Figma e design systems.',
          'Portfólio com projetos digitais.',
          'Conhecimento em UX Writing e acessibilidade.',
          'Diferencial: testes de usabilidade.'
        ],
        beneficios: [
          'VA de R$ 400,00',
          'Auxílio Home Office',
          'Gym Pass',
          'Plano de saúde',
          'Day Off',
          'Vale educação'
        ]
      },
      {
        id: 'vaga-pm',
        titulo: 'Analista de Produto Jr.',
        salario: 'R$ 4.400,00',
        area: 'Produto',
        modelo: 'Remoto',
        tipo: 'CLT',
        descricao: 'Acompanhar o ciclo de vida de produto com foco em entregas de valor e melhoria contínua.',
        atividades: [
          'Detalhar requisitos e histórias de usuário.',
          'Acompanhar backlog com stakeholders.',
          'Monitorar métricas e feedbacks de usuários.',
          'Apoiar priorização e cerimônias ágeis.'
        ],
        requisitos: [
          'Organização e boa comunicação.',
          'Noções de produto digital e metodologias ágeis.',
          'Conhecimento básico em métricas de produto.',
          'Diferencial: ferramentas como Jira/Notion.'
        ],
        beneficios: [
          'VA de R$ 400,00',
          'Auxílio Home Office',
          'Plano de saúde',
          'Gym Pass',
          'Day Off',
          'Mentoria de carreira'
        ]
      }
    ];

    const etapas = ['Currículo', 'Prova Técnica', 'Entrevista com Gestor', 'Proposta', 'Contratação'];

    const jobsList = document.getElementById('jobsList');
    const searchInput = document.getElementById('searchInput');
    const areaFilter = document.getElementById('areaFilter');
    const modeloFilter = document.getElementById('modeloFilter');
    const modalTitle = document.getElementById('modalCandidaturaLabel');

    function timelineMarkup() {
      return etapas.map((etapa, index) => `<div class="timeline-item">${index + 1}. ${etapa}</div>`).join('');
    }

    function toList(items) {
      return items.map(item => `<li>${item}</li>`).join('');
    }

    function renderJobs() {
      const query = searchInput.value.trim().toLowerCase();
      const area = areaFilter.value;
      const modelo = modeloFilter.value;

      const filtered = jobs.filter(job => {
        const searchable = `${job.titulo} ${job.area} ${job.modelo} ${job.tipo} ${job.descricao}`.toLowerCase();
        const matchesQuery = !query || searchable.includes(query);
        const matchesArea = !area || job.area === area;
        const matchesModelo = !modelo || job.modelo === modelo;
        return matchesQuery && matchesArea && matchesModelo;
      });

      if (!filtered.length) {
        jobsList.innerHTML = '<div class="empty">Nenhuma vaga encontrada para este filtro.</div>';
        return;
      }

      jobsList.innerHTML = filtered.map((job, idx) => `
        <article class="vaga-item">
          <button class="vaga-head" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${job.id}" aria-expanded="${idx === 0}" aria-controls="collapse-${job.id}">
            <div>
              <p class="vaga-title">${job.titulo}</p>
              <p class="vaga-mini">${job.salario}</p>
            </div>
            <span class="vaga-chip">${job.area}</span>
            <span class="vaga-chip">${job.modelo}</span>
            <span class="vaga-chip">${job.tipo}</span>
            <span class="vaga-arrow"><i class="fa-solid fa-chevron-down"></i></span>
          </button>

          <div id="collapse-${job.id}" class="collapse ${idx === 0 ? 'show' : ''}">
            <div class="vaga-body">
              <h4>Descrição</h4>
              <p class="text-secondary mb-1">${job.descricao}</p>

              <h4>O que faz</h4>
              <ul>${toList(job.atividades)}</ul>

              <h4>Requisitos e qualificações</h4>
              <ul>${toList(job.requisitos)}</ul>

              <h4>Benefícios</h4>
              <ul>${toList(job.beneficios)}</ul>

              <h4>Etapas do processo</h4>
              <div class="timeline">${timelineMarkup()}</div>

              <button class="btn-apply" data-bs-toggle="modal" data-bs-target="#modalCandidatura" data-vaga="${job.titulo}">Candidatar-se</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    searchInput.addEventListener('input', renderJobs);
    areaFilter.addEventListener('change', renderJobs);
    modeloFilter.addEventListener('change', renderJobs);

    document.addEventListener('click', (event) => {
      const button = event.target.closest('[data-vaga]');
      if (!button) return;
      modalTitle.textContent = `Candidatar-se — ${button.dataset.vaga}`;
    });

    const cepInput = document.getElementById('cep');
    const estadoInput = document.getElementById('estado');
    const cidadeInput = document.getElementById('cidade');

    cepInput.addEventListener('input', (event) => {
      let value = event.target.value.replace(/\D/g, '').slice(0, 8);
      if (value.length > 5) value = `${value.slice(0, 5)}-${value.slice(5)}`;
      event.target.value = value;
    });

    cepInput.addEventListener('blur', async () => {
      const cep = cepInput.value.replace(/\D/g, '');
      if (cep.length !== 8) return;
      try {
        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await response.json();
        if (!data.erro) {
          estadoInput.value = data.uf || '';
          cidadeInput.value = data.localidade || '';
        }
      } catch (error) {
        console.warn('Não foi possível buscar CEP agora.', error);
      }
    });

    renderJobs();
  </script>
</body>

</html>
