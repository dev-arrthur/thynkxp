<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos em breve | ThynkXP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: #f3efe8;
      color: #111;
      font-family: "Inter", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .soon-card {
      width: min(760px, 100%);
      padding: clamp(30px, 6vw, 62px);
      border-radius: 34px;
      background: #fcfaf6;
      border: 1px solid rgba(17, 17, 17, .08);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .soon-card::before {
      content: "Thynk";
      position: absolute;
      right: -18px;
      bottom: -8px;
      color: rgba(255, 106, 0, .08);
      font-size: clamp(74px, 17vw, 160px);
      font-weight: 950;
      line-height: .8;
      letter-spacing: -8px;
      pointer-events: none;
    }

    .soon-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff3e4;
      color: #ff6a00;
      border: 1px solid rgba(255, 106, 0, .16);
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      line-height: .95;
      font-weight: 950;
      letter-spacing: -2px;
      margin-bottom: 18px;
    }

    h1 span {
      background: linear-gradient(135deg, #ff8c00, #ff5e00, #ff9b2f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      max-width: 560px;
      margin: 0 auto 28px;
      color: #6a645c;
      line-height: 1.65;
      font-size: 17px;
    }

    .back-btn {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      background: linear-gradient(135deg, #ff8c00, #ff5e00, #ff9b2f);
      box-shadow: 0 14px 30px rgba(255, 106, 0, .28);
      transition: .25s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      color: #fff;
      box-shadow: 0 20px 40px rgba(255, 106, 0, .36);
    }
  </style>
</head>

<body>
  <main class="soon-card">
    <span class="soon-badge"><i class="fa-solid fa-wand-magic-sparkles"></i> Em produção</span>
    <h1>Os projetos estão <span>subindo.</span></h1>
    <p>
      Em breve você vai ver de perto como é ser Thynk: estratégia, design e tecnologia trabalhando juntos para transformar ideias em experiências digitais memoráveis.
    </p>
    <a class="back-btn" href="index.html#projetos">
      <i class="fa-solid fa-arrow-left"></i>
      Retornar à tela principal
    </a>
  </main>
</body>

</html>
